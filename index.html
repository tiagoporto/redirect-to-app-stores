<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>App Name</title>
</head>
<body>

<a href="https://play.google.com/store/apps/details?id=com.android.chrome">
  <img alt="Get it on Google Play" src="https://developer.android.com/images/brand/pt-br_generic_rgb_wo_45.png" />
</a>

<a href="https://itunes.apple.com/us/app/ibooks/id364709193?mt=8" target="itunes_store" style="display:inline-block;overflow:hidden;background:url(https://linkmaker.itunes.apple.com/htmlResources/assets/en_us//images/web/linkmaker/badge_appstore-lrg.png) no-repeat;width:135px;height:40px;@media only screen{background-image:url(https://linkmaker.itunes.apple.com/htmlResources/assets/en_us//images/web/linkmaker/badge_appstore-lrg.svg);}"></a>

<a href="http://www.windowsphone.com/en-us/store/app/travel/19cd0687-980b-4838-8880-5f68aba1671e"><img src="https://i-msdn.sec.s-msft.com/dynimg/IC795461.png" height="40" width="154" alt=""></a>

	<script>
		var isMobile = {
			Android: function() {
				return /Android/i.test(navigator.userAgent);
			},

			iOS: function() {
				return /iPhone|iPad|iPod/i.test(navigator.userAgent);
			},

			Windows: function() {
				return /IEMobile/i.test(navigator.userAgent);
			}
		};

		if(isMobile.Android()){
			location.replace("market://details?id=com.android.chrome");
		}else if(isMobile.iOS()){
			location.replace("itms-apps://itunes.apple.com/us/app/ibooks/id364709193?mt=8");
		}else if(isMobile.Windows()){
			location.replace("contoso:ShowProducts?CategoryID=19cd0687-980b-4838-8880-5f68aba1671e");
		}

	</script>
</body>
</html>
